<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP B.Ed Paper 2 Practice Quiz - 1/3 Negative Marking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info strong {
            color: #e74c3c;
        }

        .score-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .score-item {
            text-align: center;
            min-width: 100px;
        }

        .score-item label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .score-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .score-item.total .value { color: #667eea; }
        .score-item.correct .value { color: #27ae60; }
        .score-item.wrong .value { color: #e74c3c; }
        .score-item.negative .value { color: #e67e22; }

        .question-section {
            margin-bottom: 30px;
        }

        .question-number {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            color: #333;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #e8ecff;
        }

        .option.correct {
            border-color: #27ae60;
            background: #d4edda;
            color: #155724;
        }

        .option.wrong {
            border-color: #e74c3c;
            background: #f8d7da;
            color: #721c24;
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .hidden {
            display: none !important;
        }

        .result-section {
            text-align: center;
        }

        .result-title {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
        }

        .result-score {
            font-size: 64px;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
        }

        .result-details {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: left;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-row label {
            color: #666;
        }

        .result-row .value {
            font-weight: 600;
            color: #333;
        }

        .result-row.negative .value {
            color: #e67e22;
        }

        .result-row.final .value {
            color: #667eea;
            font-size: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        @media (max-width: 600px) {
            .quiz-container {
                padding: 25px;
            }
            h1 { font-size: 24px; }
            .question-text { font-size: 16px; }
            .score-display { flex-wrap: wrap; }
            .score-item { min-width: 80px; }
            .buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="quizSection">
            <h1>UP B.Ed Paper 2 Practice Quiz</h1>
            <p class="subtitle">100 Questions - Teaching Aptitude, Psychology, Reasoning, History, Polity, Geography</p>
            <p class="info">Negative marking: <strong>1/3</strong> point for each wrong answer</p>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%"></div>
            </div>

            <div class="score-display">
                <div class="score-item total">
                    <label>Total</label>
                    <div class="value" id="totalQuestions">100</div>
                </div>
                <div class="score-item correct">
                    <label>Correct</label>
                    <div class="value" id="correctCount">0</div>
                </div>
                <div class="score-item wrong">
                    <label>Wrong</label>
                    <div class="value" id="wrongCount">0</div>
                </div>
                <div class="score-item negative">
                    <label>Negative</label>
                    <div class="value" id="negativeMarks">0</div>
                </div>
                <div class="score-item total">
                    <label>Score</label>
                    <div class="value" id="currentScore">0</div>
                </div>
            </div>

            <div class="question-section">
                <div class="question-number" id="questionNumber">Question 1 of 100</div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
            </div>

            <div class="buttons">
                <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>Submit</button>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextQuestion()" style="display: none;">Next Question</button>
            </div>
        </div>

        <div id="resultSection" class="result-section hidden">
            <h2 class="result-title">Quiz Completed!</h2>
            <p>Your Performance Summary:</p>
            
            <div class="result-score" id="finalScore">0</div>
            
            <div class="result-details">
                <div class="result-row">
                    <label>Total Questions</label>
                    <span class="value" id="resultTotal">100</span>
                </div>
                <div class="result-row">
                    <label>Correct Answers</label>
                    <span class="value" id="resultCorrect">0</span>
                </div>
                <div class="result-row">
                    <label>Wrong Answers</label>
                    <span class="value" id="resultWrong">0</span>
                </div>
                <div class="result-row negative">
                    <label>Negative Marks (-1/3 per wrong)</label>
                    <span class="value" id="resultNegative">0</span>
                </div>
                <div class="result-row final">
                    <label>Final Score</label>
                    <span class="value" id="resultFinal">0</span>
                </div>
            </div>

            <div class="buttons">
                <button class="btn btn-primary" onclick="restartQuiz()">Restart Quiz</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {q:"Learning by Doing theory was propounded by:",options:["Piaget","Dewey","Skinner","Thorndike"],a:1},
            {q:"Trial and Error theory was given by:",options:["Kohler","Pavlov","Thorndike","Bruner"],a:2},
            {q:"The process of modifying behaviour through experience is called:",options:["Maturation","Learning","Growth","Intelligence"],a:1},
            {q:"Which is not a characteristic of a good teacher?",options:["Patience","Bias","Leadership","Communication"],a:1},
            {q:"Inclusive education means:",options:["Separate schools","Equal learning opportunities","Special schools only","Online education"],a:1},
            {q:"Intelligence Quotient was introduced by:",options:["Binet","Dewey","Skinner","Watson"],a:0},
            {q:"Classical Conditioning theory was proposed by:",options:["Pavlov","Thorndike","Skinner","Bruner"],a:0},
            {q:"Motivation refers to:",options:["Forgetting","Driving force behind behaviour","Habit","Memory"],a:1},
            {q:"The best method for active participation is:",options:["Lecture","Discussion","Dictation","Reading"],a:1},
            {q:"Continuous and Comprehensive Evaluation (CCE) emphasizes:",options:["Final exam only","Continuous assessment","Oral tests only","Objective tests only"],a:1},
            {q:"2, 6, 12, 20, 30, ?",options:["40","42","44","46"],a:1},
            {q:"5, 10, 17, 26, 37, ?",options:["48","50","52","54"],a:1},
            {q:"If CAT = DBU, then DOG = ?",options:["EPH","FQI","EOG","DPH"],a:0},
            {q:"Find the odd one out:",options:["Lion","Tiger","Cow","Leopard"],a:2},
            {q:"A is brother of B, B is sister of C. How is A related to C?",options:["Brother","Sister","Father","Uncle"],a:0},
            {q:"If SOUTH is coded as TPVUI, NORTH is coded as:",options:["OPSUI","OPRUI","NQTUI","OPTUI"],a:0},
            {q:"Clock : Time :: Thermometer : ?",options:["Heat","Degree","Temperature","Weather"],a:2},
            {q:"1, 4, 9, 16, 25, ?",options:["30","35","36","49"],a:2},
            {q:"Pointing to a woman, Ram said, "She is my mother's daughter." Who is she?",options:["Mother","Sister","Daughter","Wife"],a:1},
            {q:"A man walks 10m north, then 10m east. Distance from starting point?",options:["10m","20m","14.14m","15m"],a:2},
            {q:"The Constitution of India came into force on:",options:["15 Aug 1947","26 Jan 1950","26 Nov 1949","2 Oct 1950"],a:1},
            {q:"Chairman of the Constituent Assembly was:",options:["Nehru","Ambedkar","Rajendra Prasad","Patel"],a:2},
            {q:"Article 21 deals with:",options:["Equality","Freedom of Speech","Right to Life","Education"],a:2},
            {q:"Quit India Movement was launched in:",options:["1930","1935","1942","1947"],a:2},
            {q:"Largest state of India by area:",options:["Madhya Pradesh","Uttar Pradesh","Rajasthan","Maharashtra"],a:2},
            {q:"अंतर्दृष्टि (Insight) सिद्धांत किसने दिया?",options:["कोहलर","स्किनर","पावलॉव","बिने"],a:0},
            {q:"'शिक्षा जीवन की तैयारी नहीं, बल्कि स्वयं जीवन है' किसने कहा?",options:["गांधी","टैगोर","जॉन ड्यूई","रूसो"],a:2},
            {q:"बालक के विकास का प्रथम उत्तरदायित्व किसका है?",options:["विद्यालय","समाज","परिवार","सरकार"],a:2},
            {q:"अधिगम को प्रभावित करने वाला प्रमुख कारक कौन-सा है?",options:["प्रेरणा","ऊँचाई","रंग","वजन"],a:0},
            {q:"बुद्धि और उपलब्धि में क्या संबंध है?",options:["कोई संबंध नहीं","प्रत्यक्ष संबंध","विपरीत संबंध","आंशिक संबंध"],a:1},
            {q:"7, 14, 28, 56, ?",options:["84","96","112","120"],a:2},
            {q:"यदि PEN = 35, तो BOOK = ?",options:["41","43","45","47"],a:1},
            {q:"11, 13, 17, 19, 23, ?",options:["25","27","29","31"],a:2},
            {q:"SCHOOL को TDIPPM लिखा जाता है, तो BOOK को क्या लिखा जाएगा?",options:["CPLL","CPPL","CQQM","DQQM"],a:0},
            {q:"3:15 पर घंटे और मिनट की सुई के बीच कोण कितना होगा?",options:["0°","7.5°","15°","22.5°"],a:1},
            {q:"यदि सभी गुलाब फूल हैं और कुछ फूल लाल हैं, तो निष्कर्ष:",options:["सभी गुलाब लाल हैं","कुछ गुलाब लाल हो सकते हैं","कोई गुलाब लाल नहीं","सभी लाल फूल गुलाब हैं"],a:1},
            {q:"श्रेणी पूरी करें: A, C, F, J, O, ?",options:["T","U","V","W"],a:1},

            {q:"जलियाँवाला बाग हत्याकांड कब हुआ?",options:["1917","1918","1919","1920"],a:2},

            {q:"राज्यसभा का पदेन सभापति कौन होता है?",options:["राष्ट्रपति","प्रधानमंत्री","उपराष्ट्रपति","लोकसभा अध्यक्ष"],a:2},
