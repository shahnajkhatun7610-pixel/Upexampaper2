<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UP B.Ed Paper 2 Practice Quiz - 1/3 Negative Marking</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.quiz-container {
  background: white;
  border-radius: 15px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  max-width: 800px;
  width: 100%;
  padding: 40px;
}
h1 { color: #333; text-align: center; margin-bottom: 10px; font-size: 28px; }
.subtitle { text-align: center; color: #666; margin-bottom: 10px; font-size: 16px; }
.info { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
.info strong { color: #e74c3c; }
.score-display {
  display: flex; justify-content: space-around; margin-bottom: 30px;
  padding: 20px; background: #f8f9fa; border-radius: 10px;
  flex-wrap: wrap; gap: 15px;
}
.score-item { text-align: center; min-width: 100px; }
.score-item label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; text-transform: uppercase; }
.score-item .value { font-size: 24px; font-weight: bold; color: #333; }
.score-item.total .value { color: #667eea; }
.score-item.correct .value { color: #27ae60; }
.score-item.wrong .value { color: #e74c3c; }
.score-item.negative .value { color: #e67e22; }
.question-section { margin-bottom: 30px; }
.question-number { font-size: 14px; color: #667eea; font-weight: 600; margin-bottom: 10px; }
.question-text { font-size: 18px; color: #333; margin-bottom: 25px; line-height: 1.6; }
.options { display: flex; flex-direction: column; gap: 12px; }
.option {
  padding: 15px 20px; border: 2px solid #e0e0e0; border-radius: 8px;
  cursor: pointer; transition: all 0.3s ease; font-size: 16px; color: #333;
}
.option:hover { border-color: #667eea; background: #f8f9ff; }
.option.selected { border-color: #667eea; background: #e8ecff; }
.option.correct { border-color: #27ae60; background: #d4edda; color: #155724; }
.option.wrong { border-color: #e74c3c; background: #f8d7da; color: #721c24; }
.option.disabled { pointer-events: none; opacity: 0.7; }
.buttons { display: flex; gap: 15px; margin-top: 30px; }
.btn {
  flex: 1; padding: 15px 30px; border: none; border-radius: 8px;
  font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
}
.btn-primary { background: #667eea; color: white; }
.btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
.btn-secondary { background: #f8f9fa; color: #333; border: 2px solid #e0e0e0; }
.btn-secondary:hover { background: #e9ecef; }
.hidden { display: none !important; }
.result-section { text-align: center; }
.result-title { font-size: 32px; color: #333; margin-bottom: 20px; }
.result-score { font-size: 64px; font-weight: bold; color: #667eea; margin: 30px 0; }
.result-details {
  background: #f8f9fa; padding: 25px; border-radius: 10px;
  margin-bottom: 30px; text-align: left;
}
.result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e0e0e0; }
.result-row:last-child { border-bottom: none; }
.result-row label { color: #666; }
.result-row .value { font-weight: 600; color: #333; }
.result-row.negative .value { color: #e67e22; }
.result-row.final .value { color: #667eea; font-size: 20px; }
.progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; margin-bottom: 25px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s ease; }
@media (max-width: 600px) {
  .quiz-container { padding: 25px; }
  h1 { font-size: 24px; }
  .question-text { font-size: 16px; }
  .score-display { flex-wrap: wrap; }
  .score-item { min-width: 80px; }
  .buttons { flex-direction: column; }
}
</style>
</head>
<body>
<div class="quiz-container">
  <div id="quizSection">
    <h1>UP B.Ed Paper 2 Practice Quiz</h1>
    <p class="subtitle">300 प्रश्न - शिक्षा मनोविज्ञान, तर्कशक्ति, इतिहास, भूगोल, संविधान, विज्ञान, UP विशेष</p>
    <p class="info">Negative marking: <strong>1/3</strong> point for each wrong answer</p>
    <div class="progress-bar">
      <div class="progress-fill" id="progressBar" style="width: 0%"></div>
    </div>
    <div class="score-display">
      <div class="score-item total"><label>Total</label><div class="value" id="totalQuestions">300</div></div>
      <div class="score-item correct"><label>Correct</label><div class="value" id="correctCount">0</div></div>
      <div class="score-item wrong"><label>Wrong</label><div class="value" id="wrongCount">0</div></div>
      <div class="score-item negative"><label>Negative</label><div class="value" id="negativeMarks">0.00</div></div>
      <div class="score-item total"><label>Score</label><div class="value" id="currentScore">0.00</div></div>
    </div>
    <div class="question-section">
      <div class="question-number" id="questionNumber">Question 1 of 100</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="options"></div>
    </div>
    <div class="buttons">
      <!-- FIX 1: Removed onclick from button; handled via addEventListener in JS -->
      <button class="btn btn-primary" id="submitBtn" disabled>Submit</button>
      <button class="btn btn-secondary hidden" id="nextBtn">Next Question</button>
    </div>
  </div>

  <div id="resultSection" class="result-section hidden">
    <h2 class="result-title">Quiz Completed!</h2>
    <p>Your Performance Summary:</p>
    <div class="result-score" id="finalScore">0</div>
    <div class="result-details">
      <div class="result-row"><label>Total Questions</label><span class="value" id="resultTotal">100</span></div>
      <div class="result-row"><label>Correct Answers</label><span class="value" id="resultCorrect">0</span></div>
      <div class="result-row"><label>Wrong Answers</label><span class="value" id="resultWrong">0</span></div>
      <div class="result-row negative"><label>Negative Marks (-1/3 per wrong)</label><span class="value" id="resultNegative">0</span></div>
      <div class="result-row final"><label>Final Score</label><span class="value" id="resultFinal">0</span></div>
    </div>
    <div class="buttons">
      <button class="btn btn-primary" onclick="restartQuiz()">Restart Quiz</button>
    </div>
  </div>
</div>

<script>
const questions = [

// State
let currentQ = 0;
let selectedOption = null;
let correct = 0;
let wrong = 0;
let answered = 0;

function loadQuestion() {
  const q = questions[currentQ];
  document.getElementById('questionNumber').textContent = `Question ${currentQ + 1} of ${questions.length}`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('progressBar').style.width = `${(currentQ / questions.length) * 100}%`;

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.textContent = `${String.fromCharCode(65+i)}. ${opt}`;
    // FIX: Use addEventListener so disabled state is respected properly
    div.addEventListener('click', () => selectOption(i));
    optionsDiv.appendChild(div);
  });

  selectedOption = null;
  // FIX: Reset buttons properly using hidden class (consistent)
  const submitBtn = document.getElementById('submitBtn');
  const nextBtn = document.getElementById('nextBtn');
  submitBtn.disabled = true;
  submitBtn.classList.remove('hidden');
  nextBtn.classList.add('hidden');
}

function selectOption(index) {
  // Don't allow re-selection after answer revealed
  const options = document.querySelectorAll('.option');
  if (options[0].classList.contains('disabled')) return;

  options.forEach(o => o.classList.remove('selected'));
  options[index].classList.add('selected');
  selectedOption = index;

  // FIX: Enable submit button when an option is selected
  document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
  if (selectedOption === null) return;

  const q = questions[currentQ];
  const options = document.querySelectorAll('.option');

  // Disable all options
  options.forEach(o => o.classList.add('disabled'));

  if (selectedOption === q.a) {
    options[selectedOption].classList.add('correct');
    options[selectedOption].classList.remove('selected');
    correct++;
  } else {
    options[selectedOption].classList.add('wrong');
    options[selectedOption].classList.remove('selected');
    options[q.a].classList.add('correct');
    wrong++;
  }

  answered++;
  updateScore();

  // FIX: Use hidden class consistently
  document.getElementById('submitBtn').classList.add('hidden');
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.remove('hidden');
  nextBtn.textContent = currentQ < questions.length - 1 ? 'Next Question' : 'See Results';
}

function updateScore() {
  const negativeMarks = (wrong / 3);
  const score = correct - negativeMarks;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('negativeMarks').textContent = negativeMarks.toFixed(2);
  document.getElementById('currentScore').textContent = score.toFixed(2);
}

function nextQuestion() {
  if (currentQ < questions.length - 1) {
    currentQ++;
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quizSection').classList.add('hidden');
  document.getElementById('resultSection').classList.remove('hidden');

  const negativeMarks = (wrong / 3);
  const finalScore = correct - negativeMarks;

  document.getElementById('finalScore').textContent = finalScore.toFixed(2);
  document.getElementById('resultTotal').textContent = questions.length;
  document.getElementById('resultCorrect').textContent = correct;
  document.getElementById('resultWrong').textContent = wrong;
  document.getElementById('resultNegative').textContent = '-' + negativeMarks.toFixed(2);
  document.getElementById('resultFinal').textContent = finalScore.toFixed(2);
}

function restartQuiz() {
  currentQ = 0; selectedOption = null; correct = 0; wrong = 0; answered = 0;
  document.getElementById('correctCount').textContent = '0';
  document.getElementById('wrongCount').textContent = '0';
  document.getElementById('negativeMarks').textContent = '0.00';
  document.getElementById('currentScore').textContent = '0.00';
  document.getElementById('quizSection').classList.remove('hidden');
  document.getElementById('resultSection').classList.add('hidden');
  loadQuestion();
}

// FIX: Attach event listeners properly
document.getElementById('submitBtn').addEventListener('click', submitAnswer);
document.getElementById('nextBtn').addEventListener('click', nextQuestion);

// Initialize
loadQuestion();
</script>
